<div 
  class="relative border border-dashed rounded-2xl flex flex-col items-center justify-center p-6 text-center cursor-pointer transition-all font-sans min-h-32"
  [class.border-blue-600]="isDragging()"
  [class.bg-blue-500/5]="isDragging()"
  [class.border-zinc-250]="!isDragging()"
  [class.dark:border-zinc-800]="!isDragging()"
  [class.bg-zinc-50/50]="!isDragging()"
  [class.dark:bg-zinc-950/20]="!isDragging()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
>
  <input 
    type="file" 
    #fileInput 
    [accept]="accept" 
    (change)="onFileChange($event)" 
    class="hidden"
  >
  
  <div class="h-9 w-9 rounded-xl bg-zinc-100 dark:bg-zinc-950 flex items-center justify-center text-zinc-400 group-hover:text-blue-500 transition-colors mb-2.5">
    <mat-icon class="text-xs md:text-base">cloud_upload</mat-icon>
  </div>
  
  <span class="text-xs font-black uppercase text-zinc-900 dark:text-white leading-none">{{ label }}</span>
  <p class="text-[9px] text-zinc-400 mt-1 font-sans font-medium uppercase tracking-wide">Drag-and-Drop files or click manual browser logs</p>
</div>
