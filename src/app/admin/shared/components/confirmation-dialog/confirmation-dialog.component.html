@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-xs font-sans">
    <div class="w-full max-w-sm bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-850 p-6 rounded-2xl shadow-2xl animate-scaleIn">
      <h3 class="text-xs font-black uppercase tracking-wider text-zinc-900 dark:text-white border-b dark:border-zinc-800 pb-2.5">{{ title }}</h3>
      <p class="text-xs text-zinc-500 mt-4 leading-relaxed font-semibold">{{ message }}</p>
      
      <div class="flex items-center justify-end gap-2.5 mt-6 pt-4 border-t border-zinc-50 dark:border-zinc-950">
        <button (click)="onCancel()" class="px-4 py-2 border border-zinc-200 dark:border-zinc-800 text-xs font-bold font-sans uppercase rounded-xl bg-white dark:bg-zinc-950 hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors cursor-pointer">{{ cancelText }}</button>
        <button (click)="onConfirm()" class="px-4 py-2 bg-red-650 hover:bg-red-600 text-white text-xs font-bold font-sans uppercase rounded-xl transition-colors cursor-pointer border-none">{{ confirmText }}</button>
      </div>
    </div>
  </div>
}
