<div class="flex items-center justify-between px-4 py-3 bg-white dark:bg-zinc-900 border-t border-zinc-100 dark:border-zinc-800 rounded-b-2xl font-sans">
  <div class="flex flex-1 justify-between sm:hidden">
    <button (click)="setPage(currentPage() - 1)" [disabled]="currentPage() === 1" class="relative inline-flex items-center px-4 py-2 border border-zinc-200 dark:border-zinc-800 text-xs font-bold font-sans tracking-wide uppercase rounded-xl bg-white dark:bg-zinc-950 hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors disabled:opacity-30 disabled:pointer-events-none cursor-pointer">Previous</button>
    <button (click)="setPage(currentPage() + 1)" [disabled]="currentPage() === totalPages()" class="relative ml-3 inline-flex items-center px-4 py-2 border border-zinc-200 dark:border-zinc-800 text-xs font-bold font-sans tracking-wide uppercase rounded-xl bg-white dark:bg-zinc-950 hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors disabled:opacity-30 disabled:pointer-events-none cursor-pointer">Next</button>
  </div>
  <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
    <div>
      <p class="text-[10px] uppercase font-bold tracking-wider text-zinc-400">
        Showing
        <span class="font-mono text-zinc-900 dark:text-white font-black">{{ (currentPage() - 1) * itemsPerPage() + 1 }}</span>
        to
        <span class="font-mono text-zinc-900 dark:text-white font-black">{{ Math.min(currentPage() * itemsPerPage(), totalItems()) }}</span>
        of
        <span class="font-mono text-zinc-900 dark:text-white font-black">{{ totalItems() }}</span>
        results
      </p>
    </div>
    <div>
      <nav class="isolate inline-flex -space-x-px gap-1" aria-label="Pagination">
        <button (click)="setPage(currentPage() - 1)" [disabled]="currentPage() === 1" class="relative inline-flex items-center rounded-lg p-1 text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-900 disabled:opacity-20 disabled:pointer-events-none cursor-pointer border-none bg-none">
          <mat-icon class="text-base md:text-lg">chevron_left</mat-icon>
        </button>
        @for (page of pages; track page) {
          <button (click)="setPage(page)" [class.bg-blue-600]="currentPage() === page" [class.text-white]="currentPage() === page" [class.border-blue-600]="currentPage() === page" [class.hover:bg-blue-500]="currentPage() === page" [class.bg-zinc-50]="currentPage() !== page" [class.dark:bg-zinc-950]="currentPage() !== page" [class.text-zinc-650]="currentPage() !== page" [class.dark:text-zinc-450]="currentPage() !== page" class="relative inline-flex items-center h-7 w-7 rounded-lg text-xs font-mono font-black justify-center cursor-pointer transition-colors border-none">
            {{ page }}
          </button>
        }
        <button (click)="setPage(currentPage() + 1)" [disabled]="currentPage() === totalPages()" class="relative inline-flex items-center rounded-lg p-1 text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-900 disabled:opacity-20 disabled:pointer-events-none cursor-pointer border-none bg-none">
          <mat-icon class="text-base md:text-lg">chevron_right</mat-icon>
        </button>
      </nav>
    </div>
  </div>
</div>
