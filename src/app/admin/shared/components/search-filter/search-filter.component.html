<div class="relative w-full max-w-sm font-sans flex items-center">
  <div class="absolute left-3.5 flex items-center h-full text-zinc-400 pointer-events-none">
    <mat-icon class="text-sm md:text-base">search</mat-icon>
  </div>
  <input type="text" [value]="value" (input)="onInput($event)" [placeholder]="placeholder" class="w-full pl-10 pr-9 py-2.5 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-855 rounded-xl text-xs font-bold font-sans outline-none focus:border-blue-500/30 text-zinc-900 dark:text-white transition-colors">
  @if (value) {
    <button (click)="clear()" class="absolute right-2.5 h-6 w-6 rounded-lg text-zinc-400 hover:text-zinc-650 dark:hover:text-zinc-200 hover:bg-zinc-100 dark:hover:bg-zinc-850 flex items-center justify-center cursor-pointer transition-colors border-none bg-none">
      <mat-icon class="text-xs">close</mat-icon>
    </button>
  }
</div>
