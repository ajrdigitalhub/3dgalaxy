<div class="p-6 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-900 rounded-2xl relative overflow-hidden flex flex-col justify-between h-32 hover:border-blue-500/10 transition-colors shadow-xs group font-sans">
  <div class="flex justify-between items-start">
    <div class="space-y-0.5">
      <span class="text-[10px] font-black uppercase text-zinc-400 group-hover:text-zinc-500 transition-colors tracking-wide leading-none">{{ title }}</span>
      <h2 class="text-xl font-black text-zinc-950 dark:text-white font-mono leading-none pt-1">{{ value }}</h2>
    </div>
    <div class="h-8 w-8 rounded-xl bg-zinc-50 dark:bg-zinc-950 border dark:border-zinc-850 flex items-center justify-center text-zinc-400 group-hover:text-blue-500 group-hover:border-blue-500/10 transition-all shrink-0">
      <mat-icon class="text-sm md:text-base">{{ icon }}</mat-icon>
    </div>
  </div>
  
  <div class="flex items-center justify-between text-[10px] font-medium pt-3 border-t border-zinc-50 dark:border-zinc-950">
    <span class="text-zinc-400 font-sans truncate pr-2">{{ subtext }}</span>
    @if (trend !== 'none') {
      <span [class.text-emerald-500]="trend === 'up'" [class.text-red-500]="trend === 'down'" class="font-mono font-bold flex items-center shrink-0">
        <mat-icon class="text-xs mr-0.5 leading-none">{{ trend === 'up' ? 'trending_up' : 'trending_down' }}</mat-icon>
        {{ trendValue }}
      </span>
    }
  </div>
</div>
