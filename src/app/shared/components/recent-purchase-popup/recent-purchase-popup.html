@if (!isDismissed() && isVisible() && currentItem(); as item) {
  <div
    class="rpp-wrapper"
    [class.dark]="isDark()"
    role="status"
    aria-live="polite"
    [attr.aria-label]="'Recent purchase notification'"
  >
    <!-- Celebrate Colored Paper Confetti Burst -->
    @if (showConfetti()) {
      <div class="rpp-confetti" aria-hidden="true">
        <div class="paper p1"></div>
        <div class="paper p2"></div>
        <div class="paper p3"></div>
        <div class="paper p4"></div>
        <div class="paper p5"></div>
        <div class="paper p6"></div>
        <div class="paper p7"></div>
        <div class="paper p8"></div>
        <div class="paper p9"></div>
        <div class="paper p10"></div>
      </div>
    }

    <div
      class="rpp-animator"
      [class.rpp-enter]="!isAnimatingOut()"
      [class.rpp-exit]="isAnimatingOut()"
    >
      <!-- Clickable Card -->
      <div class="rpp-card" (click)="navigate()" (keydown.enter)="navigate()" tabindex="0" role="button" [attr.aria-label]="'View product ' + item.productName">

        <!-- Product Thumbnail -->
        <div class="rpp-image-wrap">
          <img
            [src]="item.productImage"
            [alt]="item.productName"
            class="rpp-image"
            loading="lazy"
            referrerpolicy="no-referrer"
            onerror="this.src='https://picsum.photos/seed/product/80/80'"
          />
          <!-- Cart Icon Badge -->
          <div class="rpp-cart-badge" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="rpp-cart-icon">
              <path d="M2.25 2.25a.75.75 0 0 0 0 1.5h1.386c.17 0 .318.114.362.278l2.558 9.592a3.752 3.752 0 0 0-2.806 3.63c0 .414.336.75.75.75h15.75a.75.75 0 0 0 0-1.5H5.378A2.25 2.25 0 0 1 7.5 15h11.218a.75.75 0 0 0 .674-.421 60.358 60.358 0 0 0 2.96-7.228.75.75 0 0 0-.525-.965A60.864 60.864 0 0 0 5.68 4.509l-.232-.867A1.875 1.875 0 0 0 3.636 2.25H2.25zM3.75 20.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0zM16.5 20.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0z" />
            </svg>
          </div>
          <!-- Live indicator dot -->
          <span class="rpp-live-dot" aria-hidden="true"></span>
        </div>

        <!-- Text Content -->
        <div class="rpp-content">
          @if (popupConfig().showLocation) {
            <p class="rpp-location">
              <span class="rpp-name">{{ item.customerName }}</span>
              <span class="rpp-sep"> in </span>
              <span class="rpp-city">{{ formatLocation(item) }}</span>
            </p>
          }
          <p class="rpp-product">Purchased <strong>{{ item.productName }}</strong></p>
          @if (popupConfig().showTime) {
            <p class="rpp-time">{{ formatTime(item.minutesAgo) }}</p>
          }
        </div>

      </div>

      <!-- Close Button -->
      <button class="rpp-close" (click)="$event.stopPropagation(); dismiss()" aria-label="Dismiss popup" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="12" height="12">
          <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22z"/>
        </svg>
      </button>

      <!-- Progress bar -->
      <div class="rpp-progress" [class.rpp-progress-active]="!isAnimatingOut()">
        <div class="rpp-progress-bar" [style.animation-duration]="popupConfig().displayDuration + 'ms'"></div>
      </div>
    </div>
  </div>
}
